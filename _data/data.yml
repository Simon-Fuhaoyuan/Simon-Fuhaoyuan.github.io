career-profile:
    title: Career Profile
    summary: |
      I'm currently a senior in Computer Science Department in Shanghai Jiao Tong 
      University. I'm working in [MVIG](http://mvig.sjtu.edu.cn/) group in SJTU 
      from 2019.8 to present. Our research direction in this stage is robotics and 
      3-d vision, with my personal preference on engineering track. I'm currently 
      without any experience of practice in company. I will keep updating my profile
      in the following of my career.
