experiences:
    - role: Intern
      time: 2019 - Present
      company: MVIG, SJTU
      details: |
        I start my Machine Learning experience in this laboratory. From the first
        time I touched ML to now, I've done 4 projects aiming to publish paper
        in CCF-A meetings. Now I've grasped basic tools in machine learning such
        as pytorch, sklearn, keras, etc. In real research, we do more projects in
        vision and intelligence about machine, with our transfer from vision to 
        robotics and reinforcement learning. Besides, I also gived an academic talk
        about CNN interpretability in Sep, 2019. We are looking forward to push deep
        learning into daily life use.
projects:
    title: Projects
    intro: >
      Without successful published papers or practice in company, I will list some
      course designs and projects in this part. Once I've done other excellent
      projects, I will update it here.
    assignments:
      - title: Catch a mouse
        link: 
        tagline: "A C++ object-oriented programming with GUI in QT creator. This is my course design in freshman grade, major in software engineering. The codes are really dirty and algorithms are low-level, so I didn't show its source."

      - title: Glomerulus Image Analysis
        link: "https://github.com/Simon-Fuhaoyuan/GlomerulusImage"
        tagline: "A medical image analysis based on processing and classification. We tested famous CNN architectures such as VGG, ResNet, DenseNet, Inception, etc on the glomerulus image dataset. We also proposed our Inception-ResNet structure which gets the best performance based on modification of theoritical analysis."

      - title: Optimizing Caffe
        link: "https://github.com/Simon-Fuhaoyuan/Distibuted-Parallel-Computing"
        tagline: "We replaced the codes based on cublas library in Caffe to cuda GPU codes. Moreover, for each size of matrix in multiplication, we optimize it case by case. We also used tricks such as shared memory, tiling, stream parallel, etc. More details can be found in the github repo."

      - title: LeetCode
        link: "https://github.com/Simon-Fuhaoyuan/LeetCode-100DAY-Challenge"
        tagline: "This may not be a real project, but a leetcode solution record. I started a leetcode-100day-challenge in Dec, 2019. Now I've finished it and I will keep pushing my solutions in this repo. Hoping for your star :)"

